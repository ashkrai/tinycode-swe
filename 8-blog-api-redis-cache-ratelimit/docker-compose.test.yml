version: "3.9"

# Separate compose file for integration tests.
# Usage:
#   docker-compose -f docker-compose.test.yml up -d
#   TEST_DATABASE_URL=postgres://blog:blog@localhost:5433/blog_test?sslmode=disable \
#   TEST_REDIS_URL=redis://localhost:6380/1 \
#   go test ./tests/... -run TestIntegration -v
#   docker-compose -f docker-compose.test.yml down -v

services:
  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog
      POSTGRES_DB: blog_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data   # fast, disposable
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog -d blog_test"]
      interval: 3s
      timeout: 3s
      retries: 15

  redis_test:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
