services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       blog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST:        postgres
      DB_PORT:        "5432"
      DB_USER:        postgres
      DB_PASSWORD:    postgres
      DB_NAME:        blog
      DB_SSLMODE:     disable
      MIGRATIONS_DIR: /app/migrations
    ports:
      - "8080:8080"

volumes:
  pgdata:
